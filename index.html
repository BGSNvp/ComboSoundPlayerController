<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BGSN Controller</title>
  <style>
    :root {
      --bg: #0f1220;
      --bg-elev: #171b2e;
      --bg-elev-2: #1f2540;
      --text: #e8eaf2;
      --muted: #9aa0b5;
      --accent: #6c8cff;
      --accent-glow: rgba(108, 140, 255, 0.25);
      --danger: #ff5c72;
      --success: #44d29a;
      --border: #2a3050;
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent; min-height: 100vh;
    }
    body { padding: 16px; padding-bottom: calc(80px + env(safe-area-inset-bottom)); }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .header h1 { font-size: 1.3rem; font-weight: 700; }
    .status { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .status.connected { background: var(--success); color: #0a0d1a; }
    .status.offline { background: var(--danger); color: #fff; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { flex: 1; min-width: 0; padding: 10px 4px; border: 2px solid var(--border); border-radius: 10px; background: var(--bg-elev); color: var(--muted); font: inherit; font-size: 0.78rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; white-space: nowrap; }
    .tab.active { border-color: var(--accent); color: var(--text); background: var(--bg-elev-2); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* Player list */
    .player-list { display: flex; flex-direction: column; gap: 10px; }
    .player-btn {
      display: flex; align-items: center; gap: 14px;
      background: var(--bg-elev); border: 2px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; color: var(--text); font: inherit; font-size: 1rem; text-align: left;
      cursor: pointer; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .player-btn:active { background: var(--bg-elev-2); }
    .player-btn.active { border-color: var(--accent); background: var(--bg-elev-2); box-shadow: 0 0 0 1px var(--accent), 0 2px 12px var(--accent-glow); }
    .player-number { background: var(--accent); color: #fff; font-weight: 800; font-size: 1.1rem; min-width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 10px; flex-shrink: 0; }
    .player-details { flex: 1; min-width: 0; }
    .player-name-text { font-weight: 700; font-size: 1.05rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-meta { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

    /* Manage roster form */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; background: var(--bg-elev); color: var(--text); font: inherit; font-size: 0.95rem; outline: none; }
    .form-group input:focus { border-color: var(--accent); }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    .btn { padding: 12px 20px; border: none; border-radius: 10px; font: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn:active { opacity: 0.7; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--muted); }
    .btn-row { display: flex; gap: 10px; margin-top: 12px; }
    .btn-row .btn { flex: 1; }

    .roster-item { display: flex; align-items: center; gap: 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
    .roster-item .player-details { flex: 1; }
    .roster-item .edit-btn, .roster-item .del-btn { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; padding: 4px 8px; }
    .roster-item .del-btn { color: var(--danger); }

    .empty-msg { color: var(--muted); text-align: center; padding: 40px 20px; font-size: 0.9rem; }

    /* Bottom bar */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(15, 18, 32, 0.95); backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); display: flex; gap: 10px;
    }
    .bottom-bar button { flex: 1; padding: 14px; border: none; border-radius: 10px; font: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .bottom-bar button:active { opacity: 0.7; }
    .btn-show { background: var(--success); color: #0a0d1a; }
    .btn-hide { background: var(--danger); color: #fff; }

    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--bg-elev-2); color: var(--text); padding: 10px 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.4); opacity: 0; transition: transform 0.3s, opacity 0.3s; pointer-events: none; z-index: 100; }
    .toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Style panel */
    .style-field { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .style-field-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .style-field-header h4 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .toggle { position: relative; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; inset: 0; background: var(--border); border-radius: 12px; cursor: pointer; transition: background 0.2s; }
    .toggle .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(20px); }
    .style-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .style-controls label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); display: block; margin-bottom: 2px; }
    .style-controls input[type="number"] { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font: inherit; font-size: 0.85rem; }
    .style-controls input[type="color"] { width: 100%; height: 32px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); cursor: pointer; padding: 2px; }
    .btn-save-styles { width: 100%; margin-top: 16px; }

    /* ===== Soundboard tab ===== */
    .sound-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .sound-header h3 { flex: 1; font-size: 0.95rem; }
    .vol-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .vol-row span { font-size: 0.8rem; color: var(--muted); }
    .vol-row input[type="range"] { flex: 1; accent-color: var(--accent); }

    .sound-cats { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
    .sound-cat { padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-elev); color: var(--muted); font: inherit; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .sound-cat.active { border-color: var(--accent); color: var(--text); background: var(--bg-elev-2); }

    .sound-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    .sound-btn {
      padding: 14px 8px; border: 2px solid var(--border); border-radius: 10px;
      background: var(--bg-elev); color: var(--text); font: inherit; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s;
      word-break: break-word;
    }
    .sound-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); transform: scale(0.95); }
    .sound-btn.playing { border-color: var(--success); box-shadow: 0 0 0 1px var(--success), 0 2px 12px rgba(68,210,154,0.25); }

    .stop-all-btn { width: 100%; margin-top: 14px; padding: 14px; background: var(--danger); color: #fff; border: none; border-radius: 10px; font: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
    .stop-all-btn:active { opacity: 0.7; }

    /* Manage sounds form */
    .sound-item { display: flex; align-items: center; gap: 8px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; }
    .sound-item .sound-label { flex: 1; font-size: 0.85rem; font-weight: 600; }
    .sound-item .sound-file { color: var(--muted); font-size: 0.7rem; }
    .sound-item button { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 4px 6px; }
    .sound-item .del-btn { color: var(--danger); }

    /* Portrait phone optimizations */
    @media (max-width: 420px) {
      body { padding: 12px; padding-bottom: calc(76px + env(safe-area-inset-bottom)); }
      .header h1 { font-size: 1.1rem; }
      .tabs { gap: 3px; }
      .tab { padding: 8px 2px; font-size: 0.68rem; }
      .form-row { flex-direction: column; gap: 0; }
      .style-controls { grid-template-columns: 1fr; }
      .player-btn { padding: 12px; gap: 10px; }
      .player-number { min-width: 42px; height: 42px; font-size: 1rem; }
      .style-field { padding: 10px; }
      .bottom-bar { padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); }
      .bottom-bar button { padding: 12px; font-size: 0.85rem; }
      .sound-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 6px; }
      .sound-btn { padding: 12px 6px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>BGSN Controller</h1>
    <span id="statusBadge" class="status offline">Connecting</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('select')">Select</button>
    <button class="tab" onclick="switchTab('manage')">Roster</button>
    <button class="tab" onclick="switchTab('style')">Style</button>
    <button class="tab" onclick="switchTab('sounds')">Sounds</button>
    <button class="tab" onclick="switchTab('manageSounds')">Edit Sounds</button>
  </div>

  <!-- SELECT tab -->
  <div id="panelSelect" class="panel active">
    <div id="playerList" class="player-list"></div>
    <div id="emptySelect" class="empty-msg" style="display:none;">No players yet. Go to Roster tab to add some.</div>
  </div>

  <!-- MANAGE ROSTER tab -->
  <div id="panelManage" class="panel">
    <div id="rosterList"></div>
    <div id="emptyManage" class="empty-msg" style="display:none;">No players yet.</div>
    <h3 style="margin:20px 0 12px; font-size:1rem;" id="formTitle">Add Player</h3>
    <form id="playerForm" onsubmit="return savePlayer(event)">
      <input type="hidden" id="editId" />
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="fName" placeholder="Full name" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Number</label>
          <input type="text" id="fNumber" placeholder="#" required />
        </div>
        <div class="form-group">
          <label>Grade</label>
          <input type="text" id="fGrade" placeholder="Junior" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Height</label>
          <input type="text" id="fHeight" placeholder="6'2&quot;" />
        </div>
        <div class="form-group">
          <label>Weight</label>
          <input type="text" id="fWeight" placeholder="185 lbs" />
        </div>
      </div>
      <div class="form-group">
        <label>Video</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <select id="fVideoSelect" onchange="onVideoSelect()" style="flex:1;padding:10px 12px;border:2px solid var(--border);border-radius:10px;background:var(--bg-elev);color:var(--text);font:inherit;font-size:0.95rem;">
            <option value="">-- Select from repo --</option>
          </select>
          <button type="button" class="btn btn-outline" onclick="refreshVideoList()" style="padding:10px 12px;font-size:0.8rem;">&#8635;</button>
        </div>
        <input type="text" id="fVideo" placeholder="Or paste a URL manually" style="margin-top:6px;" />
      </div>
      <div class="btn-row">
        <button type="submit" class="btn btn-accent" id="saveBtn">Add Player</button>
        <button type="button" class="btn btn-outline" onclick="cancelEdit()" id="cancelBtn" style="display:none;">Cancel</button>
      </div>
    </form>
  </div>

  <!-- STYLE tab -->
  <div id="panelStyle" class="panel">
    <div id="styleFields"></div>
    <button class="btn btn-accent btn-save-styles" onclick="saveStyles()">Apply Styles</button>
  </div>

  <!-- SOUNDBOARD tab -->
  <div id="panelSounds" class="panel">
    <div class="vol-row">
      <span>&#128264;</span>
      <input id="masterVol" type="range" min="0" max="1" step="0.01" value="0.9" />
      <span id="volLabel">90%</span>
    </div>
    <div id="soundCats" class="sound-cats"></div>
    <div id="soundGrid" class="sound-grid"></div>
    <button class="stop-all-btn" onclick="stopAllSounds()">&#9632; Stop All</button>
  </div>

  <!-- MANAGE SOUNDS tab -->
  <div id="panelManageSounds" class="panel">
    <div id="soundList"></div>
    <div id="emptySounds" class="empty-msg" style="display:none;">No sounds configured.</div>
    <h3 style="margin:20px 0 12px; font-size:1rem;" id="soundFormTitle">Add Sound</h3>
    <form id="soundForm" onsubmit="return saveSound(event)">
      <input type="hidden" id="editSoundId" />
      <div class="form-group">
        <label>Label</label>
        <input type="text" id="sLabel" placeholder="Air Horn" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>File name</label>
          <input type="text" id="sFile" placeholder="airhorn.mp3" required />
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="sCategory" placeholder="Memes" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Volume (0-1)</label>
          <input type="number" id="sVolume" value="1" min="0" max="1" step="0.1" />
        </div>
        <div class="form-group">
          <label>Hotkey</label>
          <input type="text" id="sHotkey" placeholder="1" maxlength="1" />
        </div>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn btn-accent" id="saveSoundBtn">Add Sound</button>
        <button type="button" class="btn btn-outline" onclick="cancelSoundEdit()" id="cancelSoundBtn" style="display:none;">Cancel</button>
      </div>
    </form>
    <hr style="border-color:var(--border);margin:20px 0;" />
    <h3 style="font-size:0.9rem;margin-bottom:10px;">Import from Soundboard Repo</h3>
    <p style="color:var(--muted);font-size:0.8rem;margin-bottom:10px;">Load sounds from the soundboard manifest.json:</p>
    <button class="btn btn-outline" onclick="importFromSoundboard()" style="width:100%;">Import from BGSNvp/soundboard</button>
  </div>

  <!-- Bottom bar: Show Player (7s) / Hide -->
  <div class="bottom-bar">
    <button class="btn-show" onclick="showOverlay()">&#9654; Show Player (7s)</button>
    <button class="btn-hide" onclick="hideOverlay()">Hide</button>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyABNKTrQKTiw4U78JGDFAw9eZDZM-3gK2s",
      authDomain: "bgsn-scoreboard.firebaseapp.com",
      projectId: "bgsn-scoreboard",
      storageBucket: "bgsn-scoreboard.firebasestorage.app",
      messagingSenderId: "888144845710",
      appId: "1:888144845710:web:fe848d883391be787622df"
    });
    const db = getFirestore(app);
    const liveRef = doc(db, "playerOverlay", "live");
    const rosterRef = doc(db, "playerOverlay", "roster");
    const soundConfigRef = doc(db, "soundboard", "config");
    const soundTriggerRef = doc(db, "soundboard", "trigger");

    let roster = [];
    let activeId = "";
    let overlayVisible = false;
    let connected = false;
    let currentStyles = {};
    let sounds = [];
    let soundCategories = [];
    let activeSoundCat = "All";
    let masterVol = 0.9;

    /* ========== Player Overlay Sync ========== */
    onSnapshot(rosterRef, (snap) => {
      connected = true;
      updateStatus();
      const d = snap.data();
      roster = (d && d.players) ? d.players : [];
      renderSelectList();
      renderRosterList();
    }, () => {
      connected = false;
      updateStatus();
    });

    onSnapshot(liveRef, (snap) => {
      const d = snap.data();
      if (!d) return;
      activeId = d.id || "";
      overlayVisible = !!d.visible;
      if (d.styles) currentStyles = d.styles;
      renderSelectList();
    });

    /* ========== Soundboard Sync ========== */
    onSnapshot(soundConfigRef, (snap) => {
      const d = snap.data();
      if (!d) return;
      sounds = d.sounds || [];
      soundCategories = d.categories || [];
      renderSoundCats();
      renderSoundGrid();
      renderSoundList();
    });

    /* --- Select a player (just selects, doesn't show) --- */
    window.selectPlayer = function(id) {
      const p = roster.find(r => r.id === id);
      if (!p) return;
      activeId = id;
      setDoc(liveRef, { ...p, visible: false, styles: currentStyles }).then(() => {
        showToast(p.name + " selected");
      }).catch(() => showToast("Error updating"));
    };

    /* --- Show overlay for 7 seconds --- */
    window.showOverlay = function() {
      // Write visible + a showTs so the overlay knows to re-trigger timer
      setDoc(liveRef, { visible: true, showTs: Date.now() }, { merge: true }).catch(() => showToast("Error"));
      showToast("Showing for 7s");
    };

    window.hideOverlay = function() {
      setDoc(liveRef, { visible: false }, { merge: true }).catch(() => showToast("Error"));
    };

    /* --- Roster management --- */
    function saveRoster() {
      return setDoc(rosterRef, { players: roster });
    }

    window.savePlayer = function(e) {
      e.preventDefault();
      const id = document.getElementById("editId").value;
      const data = {
        id: id || slugify(document.getElementById("fName").value) + "-" + Date.now(),
        name: document.getElementById("fName").value.trim(),
        number: document.getElementById("fNumber").value.trim(),
        grade: document.getElementById("fGrade").value.trim(),
        height: document.getElementById("fHeight").value.trim(),
        weight: document.getElementById("fWeight").value.trim(),
        video: document.getElementById("fVideo").value.trim(),
      };
      if (id) {
        const idx = roster.findIndex(r => r.id === id);
        if (idx >= 0) roster[idx] = data;
      } else {
        roster.push(data);
      }
      saveRoster().then(() => {
        showToast(id ? "Player updated" : "Player added");
        cancelEdit();
      }).catch(() => showToast("Error saving"));
      return false;
    };

    window.editPlayer = function(id) {
      const p = roster.find(r => r.id === id);
      if (!p) return;
      document.getElementById("editId").value = p.id;
      document.getElementById("fName").value = p.name;
      document.getElementById("fNumber").value = p.number;
      document.getElementById("fGrade").value = p.grade || "";
      document.getElementById("fHeight").value = p.height || "";
      document.getElementById("fWeight").value = p.weight || "";
      document.getElementById("fVideo").value = p.video || "";
      document.getElementById("formTitle").textContent = "Edit Player";
      document.getElementById("saveBtn").textContent = "Update Player";
      document.getElementById("cancelBtn").style.display = "";
      switchTab("manage");
    };

    window.deletePlayer = function(id) {
      if (!confirm("Remove this player?")) return;
      roster = roster.filter(r => r.id !== id);
      saveRoster().then(() => showToast("Player removed")).catch(() => showToast("Error"));
    };

    window.cancelEdit = function() {
      document.getElementById("playerForm").reset();
      document.getElementById("editId").value = "";
      document.getElementById("formTitle").textContent = "Add Player";
      document.getElementById("saveBtn").textContent = "Add Player";
      document.getElementById("cancelBtn").style.display = "none";
    };

    /* ========== Soundboard Controls ========== */
    window.triggerSound = function(file, volume) {
      setDoc(soundTriggerRef, {
        file: file,
        volume: (typeof volume === "number" ? volume : 1) * masterVol,
        ts: Date.now(),
        action: "play"
      }).catch(() => showToast("Error triggering sound"));
    };

    window.stopAllSounds = function() {
      setDoc(soundTriggerRef, {
        file: "",
        ts: Date.now(),
        action: "stop"
      }).catch(() => showToast("Error"));
    };

    /* Volume slider */
    const volSlider = document.getElementById("masterVol");
    const volLabel = document.getElementById("volLabel");
    volSlider.addEventListener("input", () => {
      masterVol = parseFloat(volSlider.value);
      volLabel.textContent = Math.round(masterVol * 100) + "%";
    });

    /* Sound category filter */
    window.filterSoundCat = function(cat) {
      activeSoundCat = cat;
      renderSoundCats();
      renderSoundGrid();
    };

    /* Sound management */
    function saveSoundConfig() {
      const cats = [...new Set(sounds.map(s => s.category).filter(Boolean))];
      soundCategories = cats;
      return setDoc(soundConfigRef, { sounds: sounds, categories: cats });
    }

    window.saveSound = function(e) {
      e.preventDefault();
      const editId = document.getElementById("editSoundId").value;
      const data = {
        file: document.getElementById("sFile").value.trim(),
        label: document.getElementById("sLabel").value.trim(),
        category: document.getElementById("sCategory").value.trim() || "Uncategorized",
        volume: parseFloat(document.getElementById("sVolume").value) || 1,
        hotkey: document.getElementById("sHotkey").value.trim(),
        order: editId ? (sounds.find(s => s.file === editId) || {}).order || sounds.length : sounds.length,
      };
      if (editId) {
        const idx = sounds.findIndex(s => s.file === editId);
        if (idx >= 0) sounds[idx] = data;
      } else {
        sounds.push(data);
      }
      saveSoundConfig().then(() => {
        showToast(editId ? "Sound updated" : "Sound added");
        cancelSoundEdit();
      }).catch(() => showToast("Error saving"));
      return false;
    };

    window.editSound = function(file) {
      const s = sounds.find(x => x.file === file);
      if (!s) return;
      document.getElementById("editSoundId").value = s.file;
      document.getElementById("sLabel").value = s.label;
      document.getElementById("sFile").value = s.file;
      document.getElementById("sCategory").value = s.category || "";
      document.getElementById("sVolume").value = s.volume || 1;
      document.getElementById("sHotkey").value = s.hotkey || "";
      document.getElementById("soundFormTitle").textContent = "Edit Sound";
      document.getElementById("saveSoundBtn").textContent = "Update Sound";
      document.getElementById("cancelSoundBtn").style.display = "";
    };

    window.deleteSound = function(file) {
      if (!confirm("Remove this sound?")) return;
      sounds = sounds.filter(s => s.file !== file);
      saveSoundConfig().then(() => showToast("Sound removed")).catch(() => showToast("Error"));
    };

    window.cancelSoundEdit = function() {
      document.getElementById("soundForm").reset();
      document.getElementById("editSoundId").value = "";
      document.getElementById("soundFormTitle").textContent = "Add Sound";
      document.getElementById("saveSoundBtn").textContent = "Add Sound";
      document.getElementById("cancelSoundBtn").style.display = "none";
      document.getElementById("sVolume").value = "1";
    };

    /* Import from soundboard repo manifest */
    window.importFromSoundboard = async function() {
      showToast("Fetching manifest...");
      try {
        const resp = await fetch("https://raw.githubusercontent.com/BGSNvp/soundboard/main/manifest.json");
        if (!resp.ok) throw new Error("Failed to fetch manifest");
        const data = await resp.json();
        const rawSounds = Array.isArray(data) ? data : data.sounds || [];
        const imported = rawSounds.map((s, i) => ({
          file: s.file,
          label: s.label || s.file.replace(/\.\w+$/, ""),
          category: s.category || "Uncategorized",
          volume: typeof s.volume === "number" ? s.volume : 1,
          hotkey: s.hotkey || "",
          order: typeof s.order === "number" ? s.order : i,
        }));
        // Merge: add any sounds not already present
        const existingFiles = new Set(sounds.map(s => s.file));
        let added = 0;
        imported.forEach(s => {
          if (!existingFiles.has(s.file)) {
            sounds.push(s);
            added++;
          }
        });
        if (data.categories) {
          soundCategories = [...new Set([...soundCategories, ...data.categories])];
        }
        await saveSoundConfig();
        showToast(added + " sound(s) imported");
      } catch (e) {
        showToast("Import failed: " + e.message);
      }
    };

    /* ========== Tabs ========== */
    const TAB_IDS = ['select', 'manage', 'style', 'sounds', 'manageSounds'];
    window.switchTab = function(tab) {
      document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", TAB_IDS[i] === tab));
      document.getElementById("panelSelect").classList.toggle("active", tab === "select");
      document.getElementById("panelManage").classList.toggle("active", tab === "manage");
      document.getElementById("panelStyle").classList.toggle("active", tab === "style");
      document.getElementById("panelSounds").classList.toggle("active", tab === "sounds");
      document.getElementById("panelManageSounds").classList.toggle("active", tab === "manageSounds");
      if (tab === "style") renderStylePanel();
    };

    /* ========== Render functions ========== */
    function renderSelectList() {
      const list = document.getElementById("playerList");
      const empty = document.getElementById("emptySelect");
      if (!roster.length) { list.innerHTML = ""; empty.style.display = ""; return; }
      empty.style.display = "none";
      list.innerHTML = roster.map(p =>
        '<button class="player-btn' + (p.id === activeId ? ' active' : '') + '" onclick="selectPlayer(\'' + esc(p.id) + '\')">' +
        '<div class="player-number">#' + esc(p.number) + '</div>' +
        '<div class="player-details">' +
        '<div class="player-name-text">' + esc(p.name) + '</div>' +
        '<div class="player-meta">' + esc(p.grade) + ' &middot; ' + esc(p.height) + ' &middot; ' + esc(p.weight) + '</div>' +
        '</div></button>'
      ).join("");
    }

    function renderRosterList() {
      const list = document.getElementById("rosterList");
      const empty = document.getElementById("emptyManage");
      if (!roster.length) { list.innerHTML = ""; empty.style.display = ""; return; }
      empty.style.display = "none";
      list.innerHTML = roster.map(p =>
        '<div class="roster-item">' +
        '<div class="player-number" style="min-width:40px;height:40px;font-size:0.9rem;">#' + esc(p.number) + '</div>' +
        '<div class="player-details">' +
        '<div class="player-name-text" style="font-size:0.95rem;">' + esc(p.name) + '</div>' +
        '<div class="player-meta">' + esc(p.grade) + ' &middot; ' + esc(p.height) + ' &middot; ' + esc(p.weight) + '</div>' +
        '</div>' +
        '<button class="edit-btn" onclick="editPlayer(\'' + esc(p.id) + '\')" title="Edit">&#9998;</button>' +
        '<button class="del-btn" onclick="deletePlayer(\'' + esc(p.id) + '\')" title="Delete">&times;</button>' +
        '</div>'
      ).join("");
    }

    function renderSoundCats() {
      const el = document.getElementById("soundCats");
      const allCats = ["All", ...soundCategories];
      el.innerHTML = allCats.map(c =>
        '<button class="sound-cat' + (c === activeSoundCat ? ' active' : '') + '" onclick="filterSoundCat(\'' + esc(c) + '\')">' + esc(c) + '</button>'
      ).join("");
    }

    function renderSoundGrid() {
      const el = document.getElementById("soundGrid");
      const visible = activeSoundCat === "All" ? sounds : sounds.filter(s => s.category === activeSoundCat);
      if (!visible.length) {
        el.innerHTML = '<div class="empty-msg">No sounds' + (activeSoundCat !== "All" ? ' in this category' : '') + '.<br>Go to Edit Sounds to add some.</div>';
        return;
      }
      el.innerHTML = visible.map(s =>
        '<button class="sound-btn" onclick="triggerSound(\'' + esc(s.file) + '\', ' + (s.volume || 1) + ')">' + esc(s.label) + '</button>'
      ).join("");
    }

    function renderSoundList() {
      const list = document.getElementById("soundList");
      const empty = document.getElementById("emptySounds");
      if (!sounds.length) { list.innerHTML = ""; empty.style.display = ""; return; }
      empty.style.display = "none";
      list.innerHTML = sounds.map(s =>
        '<div class="sound-item">' +
        '<div><div class="sound-label">' + esc(s.label) + '</div><div class="sound-file">' + esc(s.file) + ' &middot; ' + esc(s.category) + '</div></div>' +
        '<button onclick="editSound(\'' + esc(s.file) + '\')" title="Edit">&#9998;</button>' +
        '<button class="del-btn" onclick="deleteSound(\'' + esc(s.file) + '\')" title="Delete">&times;</button>' +
        '</div>'
      ).join("");
    }

    function updateStatus() {
      const b = document.getElementById("statusBadge");
      b.textContent = connected ? "Connected" : "Offline";
      b.className = "status " + (connected ? "connected" : "offline");
    }

    /* ========== Style Panel ========== */
    const STYLE_FIELDS = [
      { key: 'name', label: 'Name' },
      { key: 'number', label: 'Number' },
      { key: 'grade', label: 'Grade' },
      { key: 'height', label: 'Height' },
      { key: 'weight', label: 'Weight' },
    ];

    function renderStylePanel() {
      const container = document.getElementById('styleFields');
      container.innerHTML = STYLE_FIELDS.map(f => {
        const s = currentStyles[f.key] || {};
        const visible = !s.hidden;
        const fontSize = s.fontSize || '';
        const color = s.color || '#C5B358';
        const offsetX = s.offsetX || 0;
        const offsetY = s.offsetY || 0;
        return '<div class="style-field">' +
          '<div class="style-field-header">' +
          '<h4>' + esc(f.label) + '</h4>' +
          '<label class="toggle"><input type="checkbox" data-field="' + f.key + '" data-prop="visible" ' + (visible ? 'checked' : '') + ' /><span class="slider"></span></label>' +
          '</div>' +
          '<div class="style-controls">' +
          '<div><label>Font Size (px)</label><input type="number" data-field="' + f.key + '" data-prop="fontSize" value="' + fontSize + '" placeholder="Default" min="8" max="120" /></div>' +
          '<div><label>Color</label><input type="color" data-field="' + f.key + '" data-prop="color" value="' + color + '" /></div>' +
          '<div><label>Offset X (px)</label><input type="number" data-field="' + f.key + '" data-prop="offsetX" value="' + offsetX + '" /></div>' +
          '<div><label>Offset Y (px)</label><input type="number" data-field="' + f.key + '" data-prop="offsetY" value="' + offsetY + '" /></div>' +
          '</div></div>';
      }).join('');
    }

    window.saveStyles = function() {
      const styles = {};
      STYLE_FIELDS.forEach(f => {
        const vis = document.querySelector('[data-field="' + f.key + '"][data-prop="visible"]');
        const fs = document.querySelector('[data-field="' + f.key + '"][data-prop="fontSize"]');
        const col = document.querySelector('[data-field="' + f.key + '"][data-prop="color"]');
        const ox = document.querySelector('[data-field="' + f.key + '"][data-prop="offsetX"]');
        const oy = document.querySelector('[data-field="' + f.key + '"][data-prop="offsetY"]');
        styles[f.key] = {
          hidden: vis ? !vis.checked : false,
          fontSize: fs && fs.value ? parseInt(fs.value) : null,
          color: col ? col.value : null,
          offsetX: ox && ox.value ? parseInt(ox.value) : 0,
          offsetY: oy && oy.value ? parseInt(oy.value) : 0,
        };
      });
      currentStyles = styles;
      setDoc(liveRef, { styles }, { merge: true }).then(() => {
        showToast('Styles applied');
      }).catch(() => showToast('Error saving styles'));
    };

    /* ========== Video picker from GitHub ========== */
    const REPO_OWNER = "BGSNvp";
    const OVERLAY_REPO = "ComboSoundPlayerOverlay";
    const VIDEO_FOLDER = "videos";
    const VIDEO_EXTS = [".mp4", ".webm", ".mov"];
    let videoFiles = [];

    async function fetchVideoFiles() {
      try {
        const resp = await fetch("https://api.github.com/repos/" + REPO_OWNER + "/" + OVERLAY_REPO + "/contents/" + VIDEO_FOLDER);
        if (!resp.ok) return [];
        const files = await resp.json();
        return files
          .filter(f => f.type === "file" && VIDEO_EXTS.some(ext => f.name.toLowerCase().endsWith(ext)))
          .map(f => ({ name: f.name, url: f.download_url }));
      } catch (e) {
        return [];
      }
    }

    function populateVideoSelect(files) {
      const sel = document.getElementById("fVideoSelect");
      sel.innerHTML = '<option value="">-- Select from repo (' + files.length + ' videos) --</option>';
      files.forEach(f => {
        sel.innerHTML += '<option value="' + esc(f.url) + '">' + esc(f.name) + '</option>';
      });
      if (!files.length) {
        sel.innerHTML = '<option value="">No videos in /' + VIDEO_FOLDER + '/ yet</option>';
      }
    }

    window.onVideoSelect = function() {
      const sel = document.getElementById("fVideoSelect");
      if (sel.value) document.getElementById("fVideo").value = sel.value;
    };

    window.refreshVideoList = function() {
      showToast("Fetching videos...");
      fetchVideoFiles().then(files => {
        videoFiles = files;
        populateVideoSelect(files);
        showToast(files.length + " video(s) found");
      });
    };

    fetchVideoFiles().then(files => {
      videoFiles = files;
      populateVideoSelect(files);
    });

    /* ========== Helpers ========== */
    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("visible");
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove("visible"), 1800);
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s || "";
      return d.innerHTML;
    }

    function slugify(s) {
      return (s || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }
  </script>
</body>
</html>
