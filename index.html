<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BGSN Controller</title>
  <style>
    :root {
      --bg: #0f1220;
      --bg-elev: #171b2e;
      --bg-elev-2: #1f2540;
      --text: #e8eaf2;
      --muted: #9aa0b5;
      --accent: #6c8cff;
      --accent-glow: rgba(108, 140, 255, 0.25);
      --danger: #ff5c72;
      --success: #44d29a;
      --border: #2a3050;
      --radius: 14px;
      --c1: #d400ff; --c2: #00f5a0; --c3: #0090f5; --c4: #f5a000; --c5: #00d4f5; --c6: #ff3b5c; --c7: #80f520;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent; min-height: 100vh;
    }
    body { padding: 16px; padding-bottom: calc(80px + env(safe-area-inset-bottom)); }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .header h1 { font-size: 1.3rem; font-weight: 700; }
    .status { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .status.connected { background: var(--success); color: #0a0d1a; }
    .status.offline { background: var(--danger); color: #fff; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { flex: 1; min-width: 0; padding: 10px 4px; border: 2px solid var(--border); border-radius: 10px; background: var(--bg-elev); color: var(--muted); font: inherit; font-size: 0.78rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; white-space: nowrap; }
    .tab.active { border-color: var(--accent); color: var(--text); background: var(--bg-elev-2); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* Player list — two side-by-side columns (by name / by number) */
    .select-columns { display: flex; gap: 8px; }
    .select-col { flex: 1; min-width: 0; }
    .col-header { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); text-align: center; margin-bottom: 4px; }
    .player-col-list { display: flex; flex-direction: column; gap: 3px; }
    .player-btn {
      display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      background: var(--bg-elev); border: 2px solid var(--border); border-radius: 8px;
      padding: 4px 6px; color: var(--text); font: inherit; font-size: 0.94rem; text-align: left;
      cursor: pointer; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      width: 100%; line-height: 1.3;
    }
    .player-btn:active { background: var(--bg-elev-2); }
    .player-btn.active { border-color: var(--accent); background: var(--bg-elev-2); box-shadow: 0 0 0 1px var(--accent), 0 2px 12px var(--accent-glow); }

    /* Manage roster form */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; background: var(--bg-elev); color: var(--text); font: inherit; font-size: 0.95rem; outline: none; }
    .form-group input:focus { border-color: var(--accent); }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    .btn { padding: 12px 20px; border: none; border-radius: 10px; font: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn:active { opacity: 0.7; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--muted); }
    .btn-row { display: flex; gap: 10px; margin-top: 12px; }
    .btn-row .btn { flex: 1; }

    .roster-item { display: flex; align-items: center; gap: 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
    .roster-item .player-details { flex: 1; }
    .roster-item .edit-btn, .roster-item .del-btn { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; padding: 4px 8px; }
    .roster-item .del-btn { color: var(--danger); }

    .empty-msg { color: var(--muted); text-align: center; padding: 40px 20px; font-size: 0.9rem; }

    /* Bottom bar */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(15, 18, 32, 0.95); backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); display: flex; gap: 10px;
    }
    .bottom-bar button { flex: 1; padding: 14px; border: none; border-radius: 10px; font: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .bottom-bar button:active { opacity: 0.7; }
    .btn-show { background: var(--success); color: #0a0d1a; }
    .btn-hide { background: var(--danger); color: #fff; }

    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--bg-elev-2); color: var(--text); padding: 10px 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.4); opacity: 0; transition: transform 0.3s, opacity 0.3s; pointer-events: none; z-index: 100; }
    .toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Style panel */
    .style-field { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .style-field-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .style-field-header h4 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .toggle { position: relative; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; inset: 0; background: var(--border); border-radius: 12px; cursor: pointer; transition: background 0.2s; }
    .toggle .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(20px); }
    .style-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .style-controls label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); display: block; margin-bottom: 2px; }
    .style-controls input[type="number"] { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font: inherit; font-size: 0.85rem; }
    .style-controls input[type="color"] { width: 40px; height: 32px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); cursor: pointer; padding: 2px; flex-shrink: 0; }
    .color-row { display: flex; gap: 6px; align-items: center; }
    .color-row input[type="text"] { flex: 1; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font: inherit; font-size: 0.8rem; font-family: monospace; }
    .btn-save-styles { width: 100%; margin-top: 16px; }

    /* Arrow pad for position controls */
    .arrow-pad { display: grid; grid-template-columns: repeat(3, 32px); grid-template-rows: repeat(3, 28px); gap: 2px; justify-content: center; }
    .arrow-pad button { background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .arrow-pad button:active { background: var(--accent); color: #fff; }
    .arrow-pad .pad-center { font-size: 0.55rem; color: var(--muted); pointer-events: none; background: transparent; border-color: transparent; }

    /* Global controls section */
    .global-controls { background: var(--bg-elev); border: 2px solid var(--accent); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
    .global-controls h3 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; color: var(--accent); }
    .global-row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
    .global-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .global-group label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .zoom-controls { display: flex; align-items: center; gap: 6px; }
    .zoom-controls button { width: 36px; height: 36px; background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 1.1rem; font-weight: 700; cursor: pointer; }
    .zoom-controls button:active { background: var(--accent); color: #fff; }
    .zoom-controls span { font-size: 0.85rem; font-weight: 600; min-width: 50px; text-align: center; color: var(--text); }

    /* ===== Soundboard panel (native) ===== */
    .sb-toolbar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
    .sb-toolbar input[type="text"] { flex: 1; min-width: 100px; padding: 8px 10px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg-elev); color: var(--text); font: inherit; font-size: 0.85rem; outline: none; }
    .sb-toolbar input[type="text"]:focus { border-color: var(--accent); }
    .sb-toolbar .sb-btn { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-elev); color: var(--text); font: inherit; font-size: 0.75rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .sb-toolbar .sb-btn:active { opacity: 0.7; }
    .sb-toolbar .sb-btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
    .sb-toolbar .sb-btn.danger { border-color: var(--danger); color: var(--danger); }

    .sb-cats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .sb-cat-btn { padding: 5px 12px; border: 2px solid var(--border); border-radius: 20px; background: transparent; color: var(--text); font: inherit; font-size: 0.75rem; font-weight: 700; cursor: pointer; white-space: nowrap; text-transform: uppercase; }
    .sb-cat-btn.active { background: rgba(255,255,255,0.12); }
    .sb-cat-btn[data-cat="cat1"] { border-color: var(--c1); color: var(--c1); }
    .sb-cat-btn[data-cat="cat1"].active { background: rgba(212,0,255,0.15); }
    .sb-cat-btn[data-cat="cat2"] { border-color: var(--c2); color: var(--c2); }
    .sb-cat-btn[data-cat="cat2"].active { background: rgba(0,245,160,0.15); }
    .sb-cat-btn[data-cat="cat3"] { border-color: var(--c3); color: var(--c3); }
    .sb-cat-btn[data-cat="cat3"].active { background: rgba(0,144,245,0.15); }
    .sb-cat-btn[data-cat="cat4"] { border-color: var(--c4); color: var(--c4); }
    .sb-cat-btn[data-cat="cat4"].active { background: rgba(245,160,0,0.15); }
    .sb-cat-btn[data-cat="cat5"] { border-color: var(--c5); color: var(--c5); }
    .sb-cat-btn[data-cat="cat5"].active { background: rgba(0,212,245,0.15); }
    .sb-cat-btn[data-cat="cat6"] { border-color: var(--c6); color: var(--c6); }
    .sb-cat-btn[data-cat="cat6"].active { background: rgba(255,59,92,0.15); }
    .sb-cat-btn[data-cat="cat7"] { border-color: var(--c7); color: var(--c7); }
    .sb-cat-btn[data-cat="cat7"].active { background: rgba(128,245,32,0.15); }

    .sb-vol-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 0.75rem; color: var(--muted); }
    .sb-vol-row input[type="range"] { flex: 1; max-width: 160px; accent-color: var(--accent); }
    .sb-vol-row .vol-label { color: var(--accent); font-weight: 700; min-width: 32px; }

    .sb-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
    .sb-card {
      background: var(--bg-elev); border: 1.5px solid var(--border); border-radius: 8px;
      padding: 12px 8px; cursor: pointer; position: relative; overflow: hidden;
      user-select: none; -webkit-user-select: none; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent; outline: none;
      white-space: nowrap; text-overflow: ellipsis;
    }
    .sb-card.dragging { opacity: 0.5; transform: scale(0.95); }
    .sb-card.drag-over { border-top: 3px solid var(--accent); }
    .sb-card .sb-label { font-size: 1.02rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; display: block; }
    .sb-card.selected { border-color: var(--accent); background: var(--bg-elev-2); box-shadow: 0 0 0 1px var(--accent), 0 2px 12px var(--accent-glow); }
    .sb-card .sb-progress { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--accent); width: 0%; transition: width 0.1s linear; }
    .sb-card.playing { filter: brightness(1.3); box-shadow: 0 0 8px rgba(255,255,255,0.1); }
    .sb-card[data-ci="1"] { border-left: 4px solid var(--c1); background: rgba(212,0,255,0.08); }
    .sb-card[data-ci="1"] .sb-label { color: var(--c1); }
    .sb-card[data-ci="2"] { border-left: 4px solid var(--c2); background: rgba(0,245,160,0.08); }
    .sb-card[data-ci="2"] .sb-label { color: var(--c2); }
    .sb-card[data-ci="3"] { border-left: 4px solid var(--c3); background: rgba(0,144,245,0.08); }
    .sb-card[data-ci="3"] .sb-label { color: var(--c3); }
    .sb-card[data-ci="4"] { border-left: 4px solid var(--c4); background: rgba(245,160,0,0.08); }
    .sb-card[data-ci="4"] .sb-label { color: var(--c4); }
    .sb-card[data-ci="5"] { border-left: 4px solid var(--c5); background: rgba(0,212,245,0.08); }
    .sb-card[data-ci="5"] .sb-label { color: var(--c5); }
    .sb-card[data-ci="6"] { border-left: 4px solid var(--c6); background: rgba(255,59,92,0.08); }
    .sb-card[data-ci="6"] .sb-label { color: var(--c6); }
    .sb-card[data-ci="7"] { border-left: 4px solid var(--c7); background: rgba(128,245,32,0.08); }
    .sb-card[data-ci="7"] .sb-label { color: var(--c7); }
    .sb-empty { grid-column: 1/-1; text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.85rem; line-height: 2; }

    /* Sound add/edit modal */
    .sb-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
    .sb-modal-overlay.open { display: flex; }
    .sb-modal { background: var(--bg-elev); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
    .sb-modal h3 { font-size: 1rem; font-weight: 700; color: var(--accent); }
    .sb-field { display: flex; flex-direction: column; gap: 4px; }
    .sb-field label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .sb-field input, .sb-field select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font: inherit; font-size: 0.9rem; padding: 8px 10px; outline: none; }
    .sb-field input:focus, .sb-field select:focus { border-color: var(--accent); }
    .sb-modal-actions { display: flex; gap: 8px; }
    .sb-modal-actions .btn { flex: 1; padding: 10px; font-size: 0.85rem; }

    /* Context menu */
    .sb-ctx { display: none; position: fixed; background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 10px; padding: 6px 0; z-index: 300; min-width: 150px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .sb-ctx.open { display: block; }
    .sb-ctx-item { padding: 10px 16px; font-size: 0.8rem; cursor: pointer; }
    .sb-ctx-item:active { background: rgba(255,255,255,0.06); }
    .sb-ctx-item.red { color: var(--danger); }

    /* Portrait phone optimizations */
    @media (max-width: 420px) {
      body { padding: 12px; padding-bottom: calc(76px + env(safe-area-inset-bottom)); }
      .header h1 { font-size: 1.1rem; }
      .tabs { gap: 3px; }
      .tab { padding: 8px 2px; font-size: 0.68rem; }
      .form-row { flex-direction: column; gap: 0; }
      .style-controls { grid-template-columns: 1fr; }
      .player-btn { padding: 3px 4px; font-size: 0.86rem; }
      .player-col-list { gap: 2px; }
      .select-columns { gap: 4px; }
      .style-field { padding: 10px; }
      .bottom-bar { padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); }
      .bottom-bar button { padding: 12px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>BGSN Controller</h1>
    <span id="statusBadge" class="status offline">Connecting</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('select')">Select</button>
    <button class="tab" onclick="switchTab('manage')">Roster</button>
    <button class="tab" onclick="switchTab('style')">Style</button>
    <button class="tab" onclick="switchTab('sounds')">Sounds</button>
  </div>

  <!-- SELECT tab -->
  <div id="panelSelect" class="panel active">
    <div class="select-columns">
      <div class="select-col">
        <div class="col-header">By Name</div>
        <div id="playerListByName" class="player-col-list"></div>
      </div>
      <div class="select-col">
        <div class="col-header">By Number</div>
        <div id="playerListByNumber" class="player-col-list"></div>
      </div>
    </div>
    <div id="emptySelect" class="empty-msg" style="display:none;">No players yet. Go to Roster tab to add some.</div>
  </div>

  <!-- MANAGE ROSTER tab -->
  <div id="panelManage" class="panel">
    <div id="rosterList"></div>
    <div id="emptyManage" class="empty-msg" style="display:none;">No players yet.</div>
    <h3 style="margin:20px 0 12px; font-size:1rem;" id="formTitle">Add Player</h3>
    <form id="playerForm" onsubmit="return savePlayer(event)">
      <input type="hidden" id="editId" />
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="fName" placeholder="Full name" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Number</label>
          <input type="text" id="fNumber" placeholder="#" required />
        </div>
        <div class="form-group">
          <label>Grade</label>
          <input type="text" id="fGrade" placeholder="Junior" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Height</label>
          <input type="text" id="fHeight" placeholder="6'2&quot;" />
        </div>
        <div class="form-group">
          <label>Weight</label>
          <input type="text" id="fWeight" placeholder="185 lbs" />
        </div>
      </div>
      <div class="form-group">
        <label>Video</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <select id="fVideoSelect" onchange="onVideoSelect()" style="flex:1;padding:10px 12px;border:2px solid var(--border);border-radius:10px;background:var(--bg-elev);color:var(--text);font:inherit;font-size:0.95rem;">
            <option value="">-- Select from repo --</option>
          </select>
          <button type="button" class="btn btn-outline" onclick="refreshVideoList()" style="padding:10px 12px;font-size:0.8rem;">&#8635;</button>
        </div>
        <input type="text" id="fVideo" placeholder="Or paste a URL manually" style="margin-top:6px;" />
      </div>
      <div class="btn-row">
        <button type="submit" class="btn btn-accent" id="saveBtn">Add Player</button>
        <button type="button" class="btn btn-outline" onclick="cancelEdit()" id="cancelBtn" style="display:none;">Cancel</button>
      </div>
    </form>
  </div>

  <!-- STYLE tab -->
  <div id="panelStyle" class="panel">
    <div id="styleFields"></div>
    <button class="btn btn-accent btn-save-styles" onclick="saveStyles()">Apply Styles</button>
  </div>

  <!-- SOUNDS tab (native, Firebase-synced) -->
  <div id="panelSounds" class="panel">
    <div class="sb-toolbar">
      <input type="text" id="sbSearch" placeholder="Search sounds..." autocomplete="off" spellcheck="false" />
      <button class="sb-btn accent" onclick="openSoundModal()">+ ADD</button>
      <button class="sb-btn" onclick="importFromRepo()">IMPORT</button>
      <button class="sb-btn danger" onclick="sbStopAll()">STOP</button>
    </div>
    <div class="sb-cats" id="sbCatBar"></div>
    <div class="sb-vol-row">
      <span>VOL</span>
      <input type="range" id="sbVolSlider" min="0" max="100" value="80" step="1" />
      <span class="vol-label" id="sbVolLabel">80%</span>
      <span id="sbSoundCount" style="margin-left:auto;font-size:0.7rem;">0</span>
    </div>
    <div class="sb-grid" id="sbGrid"></div>
  </div>

  <!-- Sound Add/Edit Modal -->
  <div class="sb-modal-overlay" id="sbModalOverlay" onclick="if(event.target===this)closeSoundModal()">
    <div class="sb-modal">
      <h3 id="sbModalTitle">Add Sound</h3>
      <div class="sb-field"><label>Sound Name</label><input type="text" id="sbFName" placeholder="e.g. Air Horn" maxlength="60" /></div>
      <div class="sb-field"><label>Category</label><select id="sbFCat"></select></div>
      <div class="sb-field"><label>Audio URL</label><input type="text" id="sbFUrl" placeholder="https://raw.githubusercontent.com/..." /></div>
      <div class="sb-field"><label>Volume Trim</label>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="range" id="sbFTrim" min="0" max="300" value="100" step="1" style="flex:1;accent-color:var(--accent);" />
          <span id="sbFTrimLabel" style="color:var(--accent);font-weight:700;min-width:36px;font-size:0.8rem;">100%</span>
        </div>
      </div>
      <div class="sb-modal-actions">
        <button class="btn btn-outline" onclick="closeSoundModal()">Cancel</button>
        <button class="btn btn-accent" onclick="saveSoundEntry()">Save</button>
      </div>
    </div>
  </div>

  <!-- Sound Context Menu -->
  <div class="sb-ctx" id="sbCtxMenu">
    <div class="sb-ctx-item" onclick="sbCtxEdit()">&#9998; Edit</div>
    <div class="sb-ctx-item" onclick="sbCtxAdjustVol()">&#127898; Volume</div>
    <div class="sb-ctx-item red" onclick="sbCtxDelete()">&#128465; Delete</div>
  </div>

  <!-- Import from Repo Modal -->
  <div class="sb-modal-overlay" id="sbImportOverlay" onclick="if(event.target===this)closeImportModal()">
    <div class="sb-modal">
      <h3>Import from GitHub Repo</h3>
      <div class="sb-field"><label>GitHub Username</label><input type="text" id="importUser" value="BGSNvp" /></div>
      <div class="sb-field"><label>Repository</label><input type="text" id="importRepo" value="bgsnSounds" /></div>
      <div class="sb-field"><label>Branch</label><input type="text" id="importBranch" value="main" /></div>
      <div id="importStatus" style="font-size:0.75rem;color:var(--muted);min-height:20px;"></div>
      <div id="importFileList" style="max-height:300px;overflow-y:auto;"></div>
      <div class="sb-modal-actions">
        <button class="btn btn-outline" onclick="closeImportModal()">Cancel</button>
        <button class="btn btn-accent" id="importScanBtn" onclick="scanRepo()">Scan Repo</button>
        <button class="btn btn-accent" id="importAddBtn" onclick="addSelectedImports()" style="display:none;">Add Selected</button>
      </div>
    </div>
  </div>

  <!-- Bottom bar: Show Player (7s) / Hide -->
  <div class="bottom-bar" id="bottomBarPlayer">
    <button class="btn-show" onclick="showOverlay()">&#9654; Show Player (7s)</button>
    <button class="btn-hide" onclick="hideOverlay()">Hide</button>
  </div>
  <div class="bottom-bar" id="bottomBarSound" style="display:none;">
    <button class="btn-show" onclick="sbPlaySelected()">&#9654; Play Sound</button>
    <button class="btn-hide" onclick="sbStopAll()">Stop</button>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyABNKTrQKTiw4U78JGDFAw9eZDZM-3gK2s",
      authDomain: "bgsn-scoreboard.firebaseapp.com",
      projectId: "bgsn-scoreboard",
      storageBucket: "bgsn-scoreboard.firebasestorage.app",
      messagingSenderId: "888144845710",
      appId: "1:888144845710:web:fe848d883391be787622df"
    });
    const db = getFirestore(app);
    const liveRef = doc(db, "playerOverlay", "live");
    const rosterRef = doc(db, "playerOverlay", "roster");
    const soundTriggerRef = doc(db, "soundboard", "trigger");
    const soundLibraryRef = doc(db, "soundboard", "library");

    let roster = [];
    let activeId = "";
    let overlayVisible = false;
    let connected = false;
    let currentStyles = {};

    /* ========== Player Overlay Sync ========== */
    onSnapshot(rosterRef, (snap) => {
      connected = true;
      updateStatus();
      const d = snap.data();
      roster = (d && d.players) ? d.players : [];
      renderSelectList();
      renderRosterList();
    }, () => {
      connected = false;
      updateStatus();
    });

    onSnapshot(liveRef, (snap) => {
      const d = snap.data();
      if (!d) return;
      activeId = d.id || "";
      overlayVisible = !!d.visible;
      if (d.styles) currentStyles = d.styles;
      renderSelectList();
    });

    /* --- Select a player (just selects, doesn't show) --- */
    window.selectPlayer = function(id) {
      const p = roster.find(r => r.id === id);
      if (!p) return;
      activeId = id;
      setDoc(liveRef, { id: p.id, name: p.name, number: p.number, grade: p.grade || "", height: p.height || "", weight: p.weight || "", video: p.video || "", visible: false }, { merge: true }).then(() => {
        showToast(p.name + " selected");
      }).catch(() => showToast("Error updating"));
    };

    /* --- Show overlay for 7 seconds --- */
    window.showOverlay = function() {
      setDoc(liveRef, { visible: true, showTs: Date.now() }, { merge: true }).catch(() => showToast("Error"));
      showToast("Showing for 7s");
    };

    window.hideOverlay = function() {
      setDoc(liveRef, { visible: false }, { merge: true }).catch(() => showToast("Error"));
    };

    /* --- Roster management --- */
    function saveRoster() {
      return setDoc(rosterRef, { players: roster });
    }

    window.savePlayer = function(e) {
      e.preventDefault();
      const id = document.getElementById("editId").value;
      const data = {
        id: id || slugify(document.getElementById("fName").value) + "-" + Date.now(),
        name: document.getElementById("fName").value.trim(),
        number: document.getElementById("fNumber").value.trim(),
        grade: document.getElementById("fGrade").value.trim(),
        height: document.getElementById("fHeight").value.trim(),
        weight: document.getElementById("fWeight").value.trim(),
        video: document.getElementById("fVideo").value.trim(),
      };
      if (id) {
        const idx = roster.findIndex(r => r.id === id);
        if (idx >= 0) roster[idx] = data;
      } else {
        roster.push(data);
      }
      saveRoster().then(() => {
        showToast(id ? "Player updated" : "Player added");
        cancelEdit();
      }).catch(() => showToast("Error saving"));
      return false;
    };

    window.editPlayer = function(id) {
      const p = roster.find(r => r.id === id);
      if (!p) return;
      document.getElementById("editId").value = p.id;
      document.getElementById("fName").value = p.name;
      document.getElementById("fNumber").value = p.number;
      document.getElementById("fGrade").value = p.grade || "";
      document.getElementById("fHeight").value = p.height || "";
      document.getElementById("fWeight").value = p.weight || "";
      document.getElementById("fVideo").value = p.video || "";
      document.getElementById("formTitle").textContent = "Edit Player";
      document.getElementById("saveBtn").textContent = "Update Player";
      document.getElementById("cancelBtn").style.display = "";
      switchTab("manage");
    };

    window.deletePlayer = function(id) {
      if (!confirm("Remove this player?")) return;
      roster = roster.filter(r => r.id !== id);
      saveRoster().then(() => showToast("Player removed")).catch(() => showToast("Error"));
    };

    window.cancelEdit = function() {
      document.getElementById("playerForm").reset();
      document.getElementById("editId").value = "";
      document.getElementById("formTitle").textContent = "Add Player";
      document.getElementById("saveBtn").textContent = "Add Player";
      document.getElementById("cancelBtn").style.display = "none";
    };

    /* ========== Soundboard — Firebase-synced ========== */
    const DEFAULT_CATS = [
      { id: 'cat1', name: 'Reactions' },
      { id: 'cat2', name: 'Alerts' },
      { id: 'cat3', name: 'Music' },
      { id: 'cat4', name: 'Comedy' },
      { id: 'cat5', name: 'Gaming' },
      { id: 'cat6', name: 'Custom' },
      { id: 'cat7', name: 'Drops' },
    ];

    let sbSounds = [];
    let sbCategories = DEFAULT_CATS.slice();
    let sbActiveCat = 'all';
    let sbSearchQ = '';
    let sbEditingId = null;
    let sbSelectedSoundId = null;
    let sbCtxTargetId = null;
    let sbMasterVol = 0.80;
    let sbAudioCtx = null;
    let sbMasterGain = null;
    const sbActiveNodes = {};
    const sbLocalInit = { done: false };
    let sbDragSrcId = null;
    let sbLastTapId = null;
    let sbLastTapTime = 0;

    function ensureSbAudioCtx() {
      if (sbAudioCtx) return;
      sbAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      sbMasterGain = sbAudioCtx.createGain();
      sbMasterGain.gain.value = sbMasterVol;
      sbMasterGain.connect(sbAudioCtx.destination);
    }

    function saveSoundLibrary() {
      return setDoc(soundLibraryRef, {
        sounds: sbSounds,
        categories: sbCategories,
      });
    }

    // Listen for real-time sound library changes from Firebase
    onSnapshot(soundLibraryRef, (snap) => {
      const d = snap.data();
      if (!d) {
        // First time — try migrating from localStorage (StreamBoard data)
        if (!sbLocalInit.done) {
          sbLocalInit.done = true;
          migrateFromLocalStorage();
        }
        return;
      }
      sbSounds = d.sounds || [];
      sbCategories = (d.categories && d.categories.length) ? d.categories : DEFAULT_CATS.slice();
      renderSbCatBar();
      renderSbGrid();
    });

    function migrateFromLocalStorage() {
      try {
        const raw = localStorage.getItem('streamboard_sounds');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length) {
            // Only migrate URL-based sounds (skip base64 data sounds — too large for Firestore)
            sbSounds = parsed.filter(s => s.url && s.url.startsWith('http')).map(s => ({
              id: s.id,
              name: s.name || 'Untitled',
              cat: s.cat || 'cat1',
              url: s.url,
              trim: typeof s.trim === 'number' ? s.trim : 1,
              fav: !!s.fav,
            }));
          }
        }
        const rawCats = localStorage.getItem('streamboard_cats');
        if (rawCats) {
          const parsed = JSON.parse(rawCats);
          if (Array.isArray(parsed) && parsed.length) sbCategories = parsed;
        }
      } catch (e) { /* ignore parse errors */ }
      if (sbSounds.length) {
        saveSoundLibrary().then(() => showToast('Migrated ' + sbSounds.length + ' sounds to cloud'));
      }
      renderSbCatBar();
      renderSbGrid();
    }

    function renderSbCatBar() {
      const bar = document.getElementById('sbCatBar');
      let html = '<button class="sb-cat-btn' + (sbActiveCat === 'all' ? ' active' : '') + '" data-cat="all" onclick="sbSetCat(\'all\')">ALL</button>';
      sbCategories.forEach(c => {
        html += '<button class="sb-cat-btn' + (sbActiveCat === c.id ? ' active' : '') + '" data-cat="' + esc(c.id) + '" onclick="sbSetCat(\'' + esc(c.id) + '\')">' + esc(c.name).toUpperCase() + '</button>';
      });
      bar.innerHTML = html;
      // Populate category select in add modal
      const sel = document.getElementById('sbFCat');
      if (sel) {
        const cur = sel.value;
        sel.innerHTML = sbCategories.map(c => '<option value="' + esc(c.id) + '">' + esc(c.name) + '</option>').join('');
        if (cur) sel.value = cur;
      }
    }

    function renderSbGrid() {
      const grid = document.getElementById('sbGrid');
      const countEl = document.getElementById('sbSoundCount');
      let pool = sbActiveCat === 'all' ? sbSounds : sbSounds.filter(s => s.cat === sbActiveCat);
      if (sbSearchQ) {
        const q = sbSearchQ.toLowerCase();
        pool = pool.filter(s => s.name.toLowerCase().includes(q));
      }
      countEl.textContent = pool.length + '/' + sbSounds.length + ' sounds';
      if (!pool.length) {
        grid.innerHTML = '<div class="sb-empty">' + (sbSounds.length ? 'No sounds match filter.' : 'No sounds yet. Tap + ADD or IMPORT.') + '</div>';
        return;
      }
      grid.innerHTML = pool.map(s => {
        const ci = sbCategories.findIndex(c => c.id === s.cat) + 1;
        return '<div class="sb-card' + (sbActiveNodes[s.id] ? ' playing' : '') + (s.id === sbSelectedSoundId ? ' selected' : '') + '" data-id="' + esc(s.id) + '" data-ci="' + ci + '">' +
          '<span class="sb-label">' + esc(s.name) + '</span>' +
          '<div class="sb-progress" id="sbpb-' + esc(s.id) + '"></div>' +
          '</div>';
      }).join('');

      // Event listeners attached via delegation in initSbGridEvents (once)
    }

    window.sbSetCat = function(cat) {
      sbActiveCat = cat;
      renderSbCatBar();
      renderSbGrid();
    };

    function sbReorderSound(fromId, toId) {
      const fromIdx = sbSounds.findIndex(s => s.id === fromId);
      const toIdx = sbSounds.findIndex(s => s.id === toId);
      if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;
      const item = sbSounds.splice(fromIdx, 1)[0];
      sbSounds.splice(toIdx, 0, item);
      saveSoundLibrary().then(() => showToast('Order saved')).catch(() => showToast('Error saving order'));
      renderSbGrid();
    }

    function initTouchDrag(grid) {
      let touchSrcId = null;
      let touchHoldTimer = null;
      let touchDragging = false;
      let touchClone = null;
      let touchStartX = 0, touchStartY = 0;

      grid.addEventListener('touchstart', (e) => {
        const card = e.target.closest('.sb-card');
        if (!card) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchHoldTimer = setTimeout(() => {
          touchHoldTimer = null;
          touchDragging = true;
          touchSrcId = card.dataset.id;
          card.classList.add('dragging');
          // Create floating clone
          touchClone = card.cloneNode(true);
          touchClone.style.cssText = 'position:fixed;z-index:999;pointer-events:none;opacity:0.8;width:' + card.offsetWidth + 'px;transform:scale(1.05);';
          touchClone.style.left = (e.touches[0].clientX - card.offsetWidth / 2) + 'px';
          touchClone.style.top = (e.touches[0].clientY - 20) + 'px';
          document.body.appendChild(touchClone);
          showToast('Drag to reorder');
          e.preventDefault();
        }, 2000);
      }, { passive: false });

      grid.addEventListener('touchmove', (e) => {
        if (touchHoldTimer) {
          const dx = Math.abs(e.touches[0].clientX - touchStartX);
          const dy = Math.abs(e.touches[0].clientY - touchStartY);
          if (dx > 10 || dy > 10) { clearTimeout(touchHoldTimer); touchHoldTimer = null; }
        }
        if (!touchDragging) return;
        e.preventDefault();
        if (touchClone) {
          touchClone.style.left = (e.touches[0].clientX - touchClone.offsetWidth / 2) + 'px';
          touchClone.style.top = (e.touches[0].clientY - 20) + 'px';
        }
        // Highlight drop target
        grid.querySelectorAll('.sb-card').forEach(c => c.classList.remove('drag-over'));
        const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        const target = el ? el.closest('.sb-card') : null;
        if (target && target.dataset.id !== touchSrcId) target.classList.add('drag-over');
      }, { passive: false });

      grid.addEventListener('touchend', (e) => {
        clearTimeout(touchHoldTimer); touchHoldTimer = null;
        if (!touchDragging) return;
        touchDragging = false;
        if (touchClone) { touchClone.remove(); touchClone = null; }
        grid.querySelectorAll('.sb-card').forEach(c => { c.classList.remove('dragging'); c.classList.remove('drag-over'); });
        const el = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
        const target = el ? el.closest('.sb-card') : null;
        if (target && touchSrcId && target.dataset.id !== touchSrcId) {
          sbReorderSound(touchSrcId, target.dataset.id);
        }
        touchSrcId = null;
      });

      grid.addEventListener('touchcancel', () => {
        clearTimeout(touchHoldTimer); touchHoldTimer = null;
        touchDragging = false;
        if (touchClone) { touchClone.remove(); touchClone = null; }
        grid.querySelectorAll('.sb-card').forEach(c => { c.classList.remove('dragging'); c.classList.remove('drag-over'); });
        touchSrcId = null;
      });
    }

    // Attach grid events ONCE via delegation (not per render)
    (function initSbGridEvents() {
      const grid = document.getElementById('sbGrid');

      // Click/double-tap delegation
      grid.addEventListener('click', (e) => {
        const card = e.target.closest('.sb-card');
        if (!card) return;
        const id = card.dataset.id;
        const now = Date.now();
        if (sbLastTapId === id && now - sbLastTapTime < 400) {
          e.preventDefault();
          sbLastTapId = null;
          sbLastTapTime = 0;
          if (sbActiveNodes[id]) {
            sbStopSound(id);
          } else {
            sbSelectedSoundId = id;
            sbPlaySound(id);
          }
          return;
        }
        sbLastTapId = id;
        sbLastTapTime = now;
        sbSelectSound(id);
      });

      // Context menu delegation
      grid.addEventListener('contextmenu', (e) => {
        const card = e.target.closest('.sb-card');
        if (!card) return;
        e.preventDefault();
        sbOpenCtx(card.dataset.id, e.clientX, e.clientY);
      });

      // Touch drag (2s hold to reorder)
      initTouchDrag(grid);
    })();

    document.getElementById('sbSearch').addEventListener('input', (e) => {
      sbSearchQ = e.target.value.trim();
      renderSbGrid();
    });

    document.getElementById('sbVolSlider').addEventListener('input', (e) => {
      sbMasterVol = e.target.value / 100;
      document.getElementById('sbVolLabel').textContent = e.target.value + '%';
      if (sbMasterGain) sbMasterGain.gain.value = sbMasterVol;
    });

    /* --- Playback --- */
    const sbBufferCache = new Map();

    async function sbFetchAndDecode(url) {
      if (sbBufferCache.has(url)) return sbBufferCache.get(url);
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const arr = await resp.arrayBuffer();
      ensureSbAudioCtx();
      const buf = await sbAudioCtx.decodeAudioData(arr);
      sbBufferCache.set(url, buf);
      return buf;
    }

    window.sbSelectSound = function(id) {
      sbSelectedSoundId = (sbSelectedSoundId === id) ? null : id;
      renderSbGrid();
      const s = sbSounds.find(x => x.id === id);
      if (s && sbSelectedSoundId) showToast(s.name + ' selected');
    };

    window.sbPlaySelected = function() {
      if (!sbSelectedSoundId) { showToast('Select a sound first'); return; }
      if (sbActiveNodes[sbSelectedSoundId]) { sbStopSound(sbSelectedSoundId); return; }
      sbPlaySound(sbSelectedSoundId);
    };

    async function sbPlaySound(id) {
      const s = sbSounds.find(x => x.id === id);
      if (!s || !s.url) { showToast('No audio URL'); return; }
      ensureSbAudioCtx();
      if (sbAudioCtx.state === 'suspended') await sbAudioCtx.resume();
      sbStopSound(id);
      const card = document.querySelector('.sb-card[data-id="' + id + '"]');
      const pb = document.getElementById('sbpb-' + id);
      const trimGain = typeof s.trim === 'number' ? s.trim : 1;
      try {
        const buf = await sbFetchAndDecode(s.url);
        const src = sbAudioCtx.createBufferSource();
        src.buffer = buf;
        const gain = sbAudioCtx.createGain();
        gain.gain.value = trimGain;
        src.connect(gain).connect(sbMasterGain);
        src.start(0);
        sbActiveNodes[id] = { source: src, startTime: sbAudioCtx.currentTime, duration: buf.duration };
        if (card) card.classList.add('playing');
        // Also trigger overlay playback via Firestore
        triggerFirestoreSound(s.url, trimGain * sbMasterVol);
        // Progress bar
        function tick() {
          if (!sbActiveNodes[id]) return;
          const pct = Math.min((sbAudioCtx.currentTime - sbActiveNodes[id].startTime) / buf.duration * 100, 100);
          if (pb) pb.style.width = pct + '%';
          if (pct < 100) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
        src.onended = () => {
          if (card) card.classList.remove('playing');
          if (pb) pb.style.width = '0%';
          delete sbActiveNodes[id];
        };
      } catch (e) {
        showToast('Playback error: ' + e.message);
        if (card) card.classList.remove('playing');
      }
    }

    function sbStopSound(id) {
      if (sbActiveNodes[id]) {
        try { sbActiveNodes[id].source.stop(); } catch (e) {}
        delete sbActiveNodes[id];
      }
      const card = document.querySelector('.sb-card[data-id="' + id + '"]');
      if (card) card.classList.remove('playing');
      const pb = document.getElementById('sbpb-' + id);
      if (pb) pb.style.width = '0%';
    }

    window.sbStopAll = function() {
      Object.keys(sbActiveNodes).forEach(id => sbStopSound(id));
      triggerFirestoreStop();
      showToast('All sounds stopped');
    };

    /* --- Firestore sound trigger (for overlay) --- */
    function triggerFirestoreSound(url, volume) {
      setDoc(soundTriggerRef, {
        file: url,
        volume: typeof volume === "number" ? volume : 1,
        ts: Date.now(),
        action: "play"
      }).catch(() => {});
    }

    function triggerFirestoreStop() {
      setDoc(soundTriggerRef, {
        file: "",
        ts: Date.now(),
        action: "stop"
      }).catch(() => {});
    }

    /* --- Add/Edit Sound Modal --- */
    window.openSoundModal = function(id) {
      sbEditingId = id || null;
      document.getElementById('sbModalTitle').textContent = id ? 'Edit Sound' : 'Add Sound';
      document.getElementById('sbFName').value = '';
      document.getElementById('sbFUrl').value = '';
      document.getElementById('sbFCat').value = sbCategories[0]?.id || 'cat1';
      document.getElementById('sbFTrim').value = 100;
      document.getElementById('sbFTrimLabel').textContent = '100%';
      if (id) {
        const s = sbSounds.find(x => x.id === id);
        if (s) {
          document.getElementById('sbFName').value = s.name;
          document.getElementById('sbFUrl').value = s.url || '';
          document.getElementById('sbFCat').value = s.cat || 'cat1';
          const trimPct = Math.round((typeof s.trim === 'number' ? s.trim : 1) * 100);
          document.getElementById('sbFTrim').value = trimPct;
          document.getElementById('sbFTrimLabel').textContent = trimPct + '%';
        }
      }
      document.getElementById('sbModalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('sbFName').focus(), 100);
    };

    window.closeSoundModal = function() {
      document.getElementById('sbModalOverlay').classList.remove('open');
      sbEditingId = null;
    };

    document.getElementById('sbFTrim').addEventListener('input', (e) => {
      document.getElementById('sbFTrimLabel').textContent = e.target.value + '%';
    });

    window.saveSoundEntry = function() {
      const name = document.getElementById('sbFName').value.trim();
      const url = document.getElementById('sbFUrl').value.trim();
      const cat = document.getElementById('sbFCat').value;
      const trim = parseInt(document.getElementById('sbFTrim').value) / 100;
      if (!name) { showToast('Enter a sound name'); return; }
      if (!url) { showToast('Enter an audio URL'); return; }
      if (sbEditingId) {
        const idx = sbSounds.findIndex(s => s.id === sbEditingId);
        if (idx >= 0) {
          sbSounds[idx] = { ...sbSounds[idx], name, url, cat, trim };
        }
      } else {
        sbSounds.push({
          id: 'snd_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
          name, url, cat, trim, fav: false,
        });
      }
      saveSoundLibrary().then(() => {
        showToast(sbEditingId ? 'Sound updated' : 'Sound added');
        closeSoundModal();
      }).catch(() => showToast('Error saving'));
    };

    /* --- Context Menu --- */
    function sbOpenCtx(id, x, y) {
      sbCtxTargetId = id;
      const menu = document.getElementById('sbCtxMenu');
      menu.classList.add('open');
      menu.style.left = Math.min(x, window.innerWidth - 160) + 'px';
      menu.style.top = Math.min(y, window.innerHeight - 140) + 'px';
    }

    document.addEventListener('pointerdown', (e) => {
      if (!e.target.closest('#sbCtxMenu')) document.getElementById('sbCtxMenu').classList.remove('open');
    });

    window.sbCtxEdit = function() {
      document.getElementById('sbCtxMenu').classList.remove('open');
      openSoundModal(sbCtxTargetId);
    };

    window.sbCtxAdjustVol = function() {
      document.getElementById('sbCtxMenu').classList.remove('open');
      openSoundModal(sbCtxTargetId);
      // Focus the trim slider
      setTimeout(() => document.getElementById('sbFTrim').focus(), 200);
    };

    window.sbCtxDelete = function() {
      document.getElementById('sbCtxMenu').classList.remove('open');
      const s = sbSounds.find(x => x.id === sbCtxTargetId);
      if (!s) return;
      if (!confirm('Delete "' + s.name + '"?')) return;
      sbSounds = sbSounds.filter(x => x.id !== sbCtxTargetId);
      saveSoundLibrary().then(() => showToast('Sound deleted')).catch(() => showToast('Error'));
    };

    /* --- Import from GitHub Repo --- */
    const AUDIO_EXTS = ['mp3', 'wav', 'ogg', 'm4a', 'flac', 'aac', 'opus', 'weba', 'mp4'];
    let importFiles = [];

    window.importFromRepo = function() {
      document.getElementById('importStatus').textContent = '';
      document.getElementById('importFileList').innerHTML = '';
      document.getElementById('importAddBtn').style.display = 'none';
      document.getElementById('importScanBtn').style.display = '';
      importFiles = [];
      document.getElementById('sbImportOverlay').classList.add('open');
    };

    window.closeImportModal = function() {
      document.getElementById('sbImportOverlay').classList.remove('open');
    };

    window.scanRepo = async function() {
      const user = document.getElementById('importUser').value.trim();
      const repo = document.getElementById('importRepo').value.trim();
      const branch = document.getElementById('importBranch').value.trim() || 'main';
      if (!user || !repo) { document.getElementById('importStatus').textContent = 'Enter username and repo'; return; }
      document.getElementById('importStatus').textContent = 'Scanning...';
      try {
        const resp = await fetch('https://api.github.com/repos/' + user + '/' + repo + '/git/trees/' + branch + '?recursive=1');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const audioFiles = (data.tree || []).filter(item => {
          if (item.type !== 'blob') return false;
          const ext = item.path.split('.').pop().toLowerCase();
          return AUDIO_EXTS.includes(ext);
        });
        importFiles = audioFiles.map(item => {
          const filename = item.path.split('/').pop();
          const nameNoExt = filename.replace(/\.[^.]+$/, '');
          return {
            name: nameNoExt,
            filename: filename,
            url: 'https://raw.githubusercontent.com/' + user + '/' + repo + '/' + branch + '/' + encodeURIComponent(item.path).replace(/%2F/g, '/'),
          };
        });
        document.getElementById('importStatus').textContent = importFiles.length + ' audio files found';
        const existingUrls = new Set(sbSounds.map(s => s.url));
        document.getElementById('importFileList').innerHTML = importFiles.map((f, i) => {
          const isDupe = existingUrls.has(f.url);
          return '<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--bg-elev);border-radius:6px;margin-bottom:3px;font-size:0.75rem;' + (isDupe ? 'opacity:0.4;' : '') + '">' +
            '<input type="checkbox" data-idx="' + i + '" ' + (isDupe ? '' : 'checked') + ' style="accent-color:var(--accent);width:14px;height:14px;" />' +
            '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + esc(f.filename) + '">' + esc(f.name) + '</span>' +
            (isDupe ? '<span style="font-size:0.65rem;color:var(--muted);">exists</span>' : '') +
            '</div>';
        }).join('');
        document.getElementById('importScanBtn').style.display = 'none';
        document.getElementById('importAddBtn').style.display = '';
      } catch (e) {
        document.getElementById('importStatus').textContent = 'Error: ' + e.message;
      }
    };

    window.addSelectedImports = function() {
      const checks = document.querySelectorAll('#importFileList input[type="checkbox"]:checked');
      let added = 0;
      checks.forEach(ch => {
        const idx = parseInt(ch.dataset.idx);
        const f = importFiles[idx];
        if (!f) return;
        sbSounds.push({
          id: 'snd_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7) + '_' + idx,
          name: f.name,
          url: f.url,
          cat: 'cat6',
          trim: 1,
          fav: false,
        });
        added++;
      });
      if (added) {
        saveSoundLibrary().then(() => {
          showToast(added + ' sound(s) imported');
          closeImportModal();
        }).catch(() => showToast('Error saving'));
      } else {
        showToast('No sounds selected');
      }
    };

    // Enable audio context on first interaction
    document.addEventListener('click', () => {
      ensureSbAudioCtx();
      if (sbAudioCtx && sbAudioCtx.state === 'suspended') sbAudioCtx.resume();
    }, { once: true });

    /* ========== Tabs ========== */
    const TAB_IDS = ['select', 'manage', 'style', 'sounds'];
    window.switchTab = function(tab) {
      document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", TAB_IDS[i] === tab));
      document.getElementById("panelSelect").classList.toggle("active", tab === "select");
      document.getElementById("panelManage").classList.toggle("active", tab === "manage");
      document.getElementById("panelStyle").classList.toggle("active", tab === "style");
      document.getElementById("panelSounds").classList.toggle("active", tab === "sounds");
      document.getElementById("bottomBarPlayer").style.display = (tab === "sounds") ? "none" : "flex";
      document.getElementById("bottomBarSound").style.display = (tab === "sounds") ? "flex" : "none";
      if (tab === "style") renderStylePanel();
    };

    /* ========== Render functions ========== */
    function renderSelectList() {
      const byName = document.getElementById("playerListByName");
      const byNum = document.getElementById("playerListByNumber");
      const empty = document.getElementById("emptySelect");
      if (!roster.length) { byName.innerHTML = ""; byNum.innerHTML = ""; empty.style.display = ""; return; }
      empty.style.display = "none";
      var btnHtml = function(p, label) {
        return '<button class="player-btn' + (p.id === activeId ? ' active' : '') + '" onclick="selectPlayer(\'' + esc(p.id) + '\')">' +
          label + '</button>';
      };
      var sortedByName = roster.slice().sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
      var sortedByNum = roster.slice().sort(function(a, b) { return (parseInt(a.number) || 0) - (parseInt(b.number) || 0); });
      byName.innerHTML = sortedByName.map(function(p) { return btnHtml(p, esc(p.name) + (p.grade ? ' \u00b7 ' + esc(p.grade) : '')); }).join("");
      byNum.innerHTML = sortedByNum.map(function(p) { return btnHtml(p, '#' + esc(p.number) + ' ' + esc(p.name) + (p.grade ? ' \u00b7 ' + esc(p.grade) : '')); }).join("");
    }

    function renderRosterList() {
      const list = document.getElementById("rosterList");
      const empty = document.getElementById("emptyManage");
      if (!roster.length) { list.innerHTML = ""; empty.style.display = ""; return; }
      empty.style.display = "none";
      list.innerHTML = roster.map(p =>
        '<div class="roster-item">' +
        '<div class="player-number" style="min-width:40px;height:40px;font-size:0.9rem;">#' + esc(p.number) + '</div>' +
        '<div class="player-details">' +
        '<div class="player-name-text" style="font-size:0.95rem;">' + esc(p.name) + '</div>' +
        '<div class="player-meta">' + esc(p.grade) + ' &middot; ' + esc(p.height) + ' &middot; ' + esc(p.weight) + '</div>' +
        '</div>' +
        '<button class="edit-btn" onclick="editPlayer(\'' + esc(p.id) + '\')" title="Edit">&#9998;</button>' +
        '<button class="del-btn" onclick="deletePlayer(\'' + esc(p.id) + '\')" title="Delete">&times;</button>' +
        '</div>'
      ).join("");
    }

    function updateStatus() {
      const b = document.getElementById("statusBadge");
      b.textContent = connected ? "Connected" : "Offline";
      b.className = "status " + (connected ? "connected" : "offline");
    }

    /* ========== Style Panel ========== */
    const STYLE_FIELDS = [
      { key: 'name', label: 'Name' },
      { key: 'number', label: 'Number' },
      { key: 'grade', label: 'Grade' },
      { key: 'height', label: 'Height' },
      { key: 'weight', label: 'Weight' },
    ];

    let globalOffsetX = 0, globalOffsetY = 0, globalZoom = 100;

    function renderStylePanel() {
      const container = document.getElementById('styleFields');
      const g = currentStyles._global || {};
      globalOffsetX = g.offsetX || 0;
      globalOffsetY = g.offsetY || 0;
      globalZoom = g.zoom || 100;

      let html = '<div class="global-controls">' +
        '<h3>Entire Display</h3>' +
        '<div class="global-row">' +
        '<div class="global-group"><label>Position</label>' + buildArrowPad('_global') + '</div>' +
        '<div class="global-group"><label>Zoom</label>' +
        '<div class="zoom-controls">' +
        '<button onclick="adjustZoom(-5)">&#8722;</button>' +
        '<span id="zoomLabel">' + globalZoom + '%</span>' +
        '<button onclick="adjustZoom(5)">+</button>' +
        '</div></div>' +
        '</div></div>';

      html += STYLE_FIELDS.map(f => {
        const s = currentStyles[f.key] || {};
        const visible = !s.hidden;
        const fontSize = s.fontSize || '';
        const color = s.color || '#C5B358';
        return '<div class="style-field">' +
          '<div class="style-field-header">' +
          '<h4>' + esc(f.label) + '</h4>' +
          '<label class="toggle"><input type="checkbox" data-field="' + f.key + '" data-prop="visible" ' + (visible ? 'checked' : '') + ' /><span class="slider"></span></label>' +
          '</div>' +
          '<div class="style-controls">' +
          '<div><label>Font Size (px)</label><input type="number" data-field="' + f.key + '" data-prop="fontSize" value="' + fontSize + '" placeholder="Default" min="8" max="120" /></div>' +
          '<div><label>Color</label><div class="color-row"><input type="color" data-field="' + f.key + '" data-prop="color" value="' + color + '" onchange="syncColorText(this)" /><input type="text" data-field="' + f.key + '" data-prop="colorHex" value="' + color + '" placeholder="#C5B358" maxlength="7" onchange="syncColorPicker(this)" /></div></div>' +
          '<div style="grid-column:1/-1;"><label>Position</label>' + buildArrowPad(f.key) + '</div>' +
          '</div></div>';
      }).join('');
      container.innerHTML = html;
    }

    function buildArrowPad(fieldKey) {
      return '<div class="arrow-pad">' +
        '<button></button><button onclick="nudge(\'' + fieldKey + '\',0,-5)">&#9650;</button><button></button>' +
        '<button onclick="nudge(\'' + fieldKey + '\', -5,0)">&#9664;</button><span class="pad-center">&#8982;</span><button onclick="nudge(\'' + fieldKey + '\',5,0)">&#9654;</button>' +
        '<button></button><button onclick="nudge(\'' + fieldKey + '\',0,5)">&#9660;</button><button></button>' +
        '</div>';
    }

    window.nudge = function(fieldKey, dx, dy) {
      if (fieldKey === '_global') {
        globalOffsetX += dx;
        globalOffsetY += dy;
        currentStyles._global = { offsetX: globalOffsetX, offsetY: globalOffsetY, zoom: globalZoom };
      } else {
        if (!currentStyles[fieldKey]) currentStyles[fieldKey] = {};
        currentStyles[fieldKey].offsetX = (currentStyles[fieldKey].offsetX || 0) + dx;
        currentStyles[fieldKey].offsetY = (currentStyles[fieldKey].offsetY || 0) + dy;
      }
      setDoc(liveRef, { styles: currentStyles }, { merge: true }).catch(() => showToast('Error'));
      renderStylePanel();
    };

    window.adjustZoom = function(delta) {
      globalZoom = Math.max(10, Math.min(300, globalZoom + delta));
      currentStyles._global = { offsetX: globalOffsetX, offsetY: globalOffsetY, zoom: globalZoom };
      const label = document.getElementById('zoomLabel');
      if (label) label.textContent = globalZoom + '%';
      setDoc(liveRef, { styles: currentStyles }, { merge: true }).catch(() => showToast('Error'));
    };

    window.syncColorText = function(colorInput) {
      const field = colorInput.getAttribute('data-field');
      const hexInput = document.querySelector('[data-field="' + field + '"][data-prop="colorHex"]');
      if (hexInput) hexInput.value = colorInput.value;
    };

    window.syncColorPicker = function(hexInput) {
      let val = hexInput.value.trim();
      if (val && !val.startsWith('#')) val = '#' + val;
      if (/^#[0-9a-fA-F]{6}$/.test(val)) {
        const field = hexInput.getAttribute('data-field');
        const colorInput = document.querySelector('[data-field="' + field + '"][data-prop="color"]');
        if (colorInput) colorInput.value = val;
        hexInput.value = val;
      }
    };

    window.saveStyles = function() {
      const styles = { _global: { offsetX: globalOffsetX, offsetY: globalOffsetY, zoom: globalZoom } };
      STYLE_FIELDS.forEach(f => {
        const vis = document.querySelector('[data-field="' + f.key + '"][data-prop="visible"]');
        const fs = document.querySelector('[data-field="' + f.key + '"][data-prop="fontSize"]');
        const col = document.querySelector('[data-field="' + f.key + '"][data-prop="color"]');
        styles[f.key] = {
          hidden: vis ? !vis.checked : false,
          fontSize: fs && fs.value ? parseInt(fs.value) : null,
          color: col ? col.value : null,
          offsetX: (currentStyles[f.key] || {}).offsetX || 0,
          offsetY: (currentStyles[f.key] || {}).offsetY || 0,
        };
      });
      currentStyles = styles;
      setDoc(liveRef, { styles }, { merge: true }).then(() => {
        showToast('Styles applied');
      }).catch(() => showToast('Error saving styles'));
    };

    /* ========== Video picker from GitHub ========== */
    const REPO_OWNER = "BGSNvp";
    const OVERLAY_REPO = "ComboSoundPlayerOverlay";
    const VIDEO_FOLDER = "videos";
    const VIDEO_EXTS = [".mp4", ".webm", ".mov"];
    let videoFiles = [];

    async function fetchVideoFiles() {
      try {
        const resp = await fetch("https://api.github.com/repos/" + REPO_OWNER + "/" + OVERLAY_REPO + "/contents/" + VIDEO_FOLDER);
        if (!resp.ok) return [];
        const files = await resp.json();
        return files
          .filter(f => f.type === "file" && VIDEO_EXTS.some(ext => f.name.toLowerCase().endsWith(ext)))
          .map(f => ({ name: f.name, url: f.download_url }));
      } catch (e) {
        return [];
      }
    }

    function populateVideoSelect(files) {
      const sel = document.getElementById("fVideoSelect");
      sel.innerHTML = '<option value="">-- Select from repo (' + files.length + ' videos) --</option>';
      files.forEach(f => {
        sel.innerHTML += '<option value="' + esc(f.url) + '">' + esc(f.name) + '</option>';
      });
      if (!files.length) {
        sel.innerHTML = '<option value="">No videos in /' + VIDEO_FOLDER + '/ yet</option>';
      }
    }

    window.onVideoSelect = function() {
      const sel = document.getElementById("fVideoSelect");
      if (sel.value) document.getElementById("fVideo").value = sel.value;
    };

    window.refreshVideoList = function() {
      showToast("Fetching videos...");
      fetchVideoFiles().then(files => {
        videoFiles = files;
        populateVideoSelect(files);
        showToast(files.length + " video(s) found");
      });
    };

    fetchVideoFiles().then(files => {
      videoFiles = files;
      populateVideoSelect(files);
    });

    /* ========== Helpers ========== */
    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("visible");
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove("visible"), 1800);
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s || "";
      return d.innerHTML;
    }

    function slugify(s) {
      return (s || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    // Init
    renderSbCatBar();
    renderSbGrid();
  </script>
</body>
</html>
